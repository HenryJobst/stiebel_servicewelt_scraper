name: Docker-Image bauen und veröffentlichen

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-push:
    name: Docker-Image bauen und in ghcr.io pushen
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v6

      - name: Docker-Metadaten extrahieren
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/stiebel-servicewelt-scraper
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Bei ghcr.io anmelden
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker-Image lokal bauen
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: scan-target:local

      - name: Trivy installieren
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Image auf CVEs scannen
        run: |
          trivy image \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            scan-target:local

      - name: Docker-Image bauen und pushen
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
